<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForestGuard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; display: flex; height: 100vh; }
        #map { flex: 1; }
        #panel {
            width: 360px; background: #1a1a2e; color: #eee;
            overflow-y: auto; padding: 16px; display: flex; flex-direction: column;
        }
        #panel h2 { margin-bottom: 12px; color: #4ade80; font-size: 18px; }
        .event {
            background: #16213e; border-radius: 8px;
            padding: 10px; margin-bottom: 8px; font-size: 13px;
            border-left: 4px solid #334155;
        }
        .event .label { color: #22d3ee; font-weight: bold; }
        .event.high { border-left-color: #ef4444; }
        .event.medium { border-left-color: #f59e0b; }
        .event.low { border-left-color: #4ade80; }
        #controls { margin-bottom: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
        #controls button {
            padding: 8px 14px; border: none; border-radius: 6px; cursor: pointer;
            background: #0f3460; color: #fff; font-size: 13px; transition: background 0.2s;
        }
        #controls button:hover { background: #e94560; }
        #status {
            font-size: 12px; color: #888; margin-bottom: 12px;
            display: flex; align-items: center; gap: 6px;
        }
        #status .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #ef4444; display: inline-block;
        }
        #status.connected .dot { background: #4ade80; }
        #events { flex: 1; overflow-y: auto; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="panel">
        <h2>ForestGuard</h2>
        <div id="controls">
            <button onclick="startDemo('chainsaw')">Бензопила</button>
            <button onclick="startDemo('gunshot')">Выстрел</button>
            <button onclick="startDemo('normal')">Птицы</button>
        </div>
        <div id="status"><span class="dot"></span> <span id="status-text">Отключено</span></div>
        <div id="events"></div>
    </div>

    <script>
        /* ---- Leaflet map ---- */
        const map = L.map('map').setView([55.751, 37.613], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        const markers = {};
        const eventsDiv = document.getElementById('events');
        const statusDiv = document.getElementById('status');
        const statusText = document.getElementById('status-text');

        function addEvent(labelText, detail, cls) {
            const el = document.createElement('div');
            el.className = 'event ' + (cls || '');
            const span = document.createElement('span');
            span.className = 'label';
            span.textContent = labelText;
            el.appendChild(span);
            if (detail) {
                el.appendChild(document.createTextNode(' ' + detail));
            }
            eventsDiv.prepend(el);
        }

        /* ---- WebSocket ---- */
        let ws;
        function connect() {
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            ws = new WebSocket(proto + '://' + location.host + '/ws');
            ws.onopen = function() {
                statusDiv.className = 'connected';
                statusText.textContent = 'Подключено';
            };
            ws.onclose = function() {
                statusDiv.className = '';
                statusText.textContent = 'Переподключение...';
                setTimeout(connect, 2000);
            };
            ws.onmessage = function(e) {
                const d = JSON.parse(e.data);
                handleEvent(d);
            };
        }
        connect();

        function handleEvent(d) {
            switch (d.event) {
                case 'mic_active':
                    d.mics.forEach(function(m, i) {
                        const name = 'Mic ' + 'ABC'[i];
                        L.circleMarker([m.lat, m.lon], {radius: 6, color: '#22d3ee', fillOpacity: 0.8})
                         .addTo(map).bindPopup(name);
                    });
                    map.setView([d.mics[0].lat, d.mics[0].lon], 15);
                    addEvent('Микрофоны активны', '', 'low');
                    break;

                case 'audio_classified':
                    var isThreat = d['class'] !== 'birds' && d['class'] !== 'silence';
                    addEvent(
                        'Звук:',
                        d['class'] + ' (' + (d.confidence*100).toFixed(0) + '%)',
                        isThreat ? 'high' : 'low'
                    );
                    break;

                case 'location_found':
                    var errStr = d.error_m ? d.error_m.toFixed(0) : '?';
                    L.circleMarker([d.lat, d.lon], {radius: 10, color: '#f59e0b', fillOpacity: 0.5})
                     .addTo(map).bindPopup('Источник (' + errStr + 'м)');
                    addEvent('Источник:', d.lat.toFixed(4) + 'N ' + d.lon.toFixed(4) + 'E', 'medium');
                    break;

                case 'agent_decision':
                    addEvent('Решение:', d.reason, d.send_drone ? 'high' : 'low');
                    break;

                case 'drone_moving':
                    if (markers.drone) map.removeLayer(markers.drone);
                    markers.drone = L.marker([d.lat, d.lon]).addTo(map).bindPopup('Дрон');
                    break;

                case 'drone_photo':
                    addEvent('Фото получено', '', 'medium');
                    break;

                case 'vision_classified':
                    addEvent('Визуально:', d.description, 'medium');
                    break;

                case 'alert_sent':
                    addEvent('Алерт:', d.text, 'high');
                    break;

                case 'pipeline_end':
                    addEvent('Готово:', d.reason, 'low');
                    break;
            }
        }

        /* ---- REST API call ---- */
        async function startDemo(scenario) {
            eventsDiv.textContent = '';
            Object.values(markers).forEach(function(m) { map.removeLayer(m); });
            try {
                const r = await fetch('/api/v1/demo', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({scenario: scenario})
                });
                const data = await r.json();
                addEvent('Запуск:', scenario, 'low');
            } catch (e) {
                addEvent('Ошибка:', e.message, 'high');
            }
        }
    </script>
</body>
</html>
