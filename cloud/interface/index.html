<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ФАВН — Мониторинг леса</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            background: #0a0a0f;
            color: #c8c8d0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ---- Header ---- */
        .header {
            height: 40px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            border-bottom: 1px solid #1a1e2a;
            background: #0d0d14;
            flex-shrink: 0;
            gap: 8px;
        }
        .logo {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #e0e0e8;
        }

        /* Tab buttons */
        .tab-btns {
            display: flex;
            gap: 2px;
            margin-left: 8px;
        }
        .tab-btn {
            padding: 4px 10px;
            border: 1px solid #1a1e2a;
            background: #111318;
            color: #555;
            font-family: inherit;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 1px;
            transition: all 0.15s;
        }
        .tab-btn:hover { border-color: #555; color: #888; }
        .tab-btn.active {
            border-color: #3b82f6;
            color: #3b82f6;
            background: rgba(59,130,246,0.08);
        }

        .ws-status {
            font-size: 11px;
            color: #ff2020;
            margin-left: 4px;
        }
        .ws-status.ok { color: #00ff41; }
        .header-spacer { flex: 1; }
        .demo-btns {
            display: flex;
            gap: 4px;
        }
        .demo-btns button {
            padding: 4px 10px;
            border: 1px solid #1a1e2a;
            background: #111318;
            color: #888;
            font-family: inherit;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 1px;
            transition: all 0.15s;
        }
        .demo-btns button:hover {
            border-color: #ff2020;
            color: #ff2020;
        }
        .demo-btns button.live-active {
            border-color: #ff2020;
            color: #ff2020;
            background: rgba(255,32,32,0.15);
            animation: pulse 1.5s infinite;
        }

        /* ---- Page containers ---- */
        .page { flex: 1; overflow: hidden; display: none; }
        .page.active { display: flex; }

        /* ---- Main grid (map page) ---- */
        .main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 480px;
            overflow: hidden;
            width: 100%;
        }

        /* ---- Map ---- */
        .map-wrap {
            position: relative;
            overflow: hidden;
        }
        #map { width: 100%; height: 100%; }

        /* ---- Events log overlay ---- */
        .events-log {
            position: absolute;
            bottom: 8px;
            left: 8px;
            z-index: 1000;
            max-height: 180px;
            width: 380px;
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse;
            pointer-events: none;
        }
        .ev-line {
            padding: 2px 6px;
            background: rgba(10, 10, 15, 0.88);
            font-size: 11px;
            line-height: 1.5;
            border-left: 2px solid #1a1e2a;
        }
        .ev-line.high { border-left-color: #ff2020; }
        .ev-line.medium { border-left-color: #ffaa00; }
        .ev-line.low { border-left-color: #00ff41; }
        .ev-time { color: #555; }
        .ev-tag { color: #ffaa00; font-weight: 600; }
        .ev-line.high .ev-tag { color: #ff2020; }
        .ev-line.low .ev-tag { color: #00ff41; }

        /* ---- Sidebar ---- */
        .sidebar {
            background: #0d0d14;
            border-left: 1px solid #1a1e2a;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .sb-section {
            border-bottom: 1px solid #1a1e2a;
            padding: 12px 14px;
        }
        .sb-section:last-child { border-bottom: none; }
        .sb-label {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 6px;
        }
        .sb-empty {
            padding: 40px 14px;
            text-align: center;
            color: #333;
            font-size: 12px;
        }

        /* Detection section */
        .detect-class {
            font-size: 16px;
            font-weight: 700;
            color: #e0e0e8;
        }
        .detect-conf {
            margin-top: 4px;
            font-size: 12px;
        }
        .conf-bar {
            font-family: inherit;
            letter-spacing: -1px;
            color: #00ff41;
        }
        .conf-bar.high { color: #ff2020; }
        .conf-bar.warn { color: #ffaa00; }
        .detect-level {
            display: inline-block;
            margin-top: 4px;
            padding: 2px 8px;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid;
            border-radius: 1px;
        }
        .level-alert { border-color: #ff2020; color: #ff2020; background: rgba(255,32,32,0.1); }
        .level-verify { border-color: #ffaa00; color: #ffaa00; background: rgba(255,170,0,0.1); }
        .level-log { border-color: #00ff41; color: #00ff41; background: rgba(0,255,65,0.1); }

        /* Triangulation section */
        .tri-coords {
            font-size: 14px;
            font-weight: 600;
            color: #e0e0e8;
        }
        .tri-error {
            font-size: 12px;
            margin-top: 2px;
        }

        /* Drone photo */
        .drone-photo {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border: 1px solid #1a1e2a;
            border-radius: 1px;
        }

        /* Vision */
        .vision-desc {
            font-size: 12px;
            color: #c8c8d0;
            line-height: 1.5;
            margin-bottom: 6px;
        }
        .vision-flags {
            display: flex;
            gap: 8px;
            font-size: 11px;
        }
        .vision-flag {
            padding: 2px 6px;
            border: 1px solid #1a1e2a;
            border-radius: 1px;
        }
        .vision-flag.yes { border-color: #ff2020; color: #ff2020; }
        .vision-flag.no { border-color: #333; color: #444; }

        /* Alert / GPT text */
        .gpt-text {
            font-size: 12px;
            color: #c8c8d0;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        /* RAG button */
        .rag-btn {
            display: block;
            width: 100%;
            padding: 8px;
            margin-top: 8px;
            border: 1px solid #1a1e2a;
            background: #111318;
            color: #888;
            font-family: inherit;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 1px;
            transition: all 0.15s;
        }
        .rag-btn:hover {
            border-color: #00ff41;
            color: #00ff41;
        }
        .rag-btn:disabled {
            opacity: 0.4;
            cursor: wait;
        }
        .rag-response {
            margin-top: 8px;
            padding: 8px;
            background: #111318;
            border: 1px solid #1a1e2a;
            font-size: 11px;
            line-height: 1.6;
            color: #c8c8d0;
            max-height: 400px;
            overflow-y: auto;
        }
        .rag-response .rag-heading {
            color: #00ff41;
            font-size: 12px;
            font-weight: 700;
            margin: 10px 0 4px 0;
            letter-spacing: 1px;
        }
        .rag-response .rag-heading:first-child { margin-top: 0; }
        .rag-response .rag-bold {
            color: #f0a030;
            font-weight: 700;
        }
        .rag-response .rag-item {
            padding-left: 12px;
            position: relative;
        }
        .rag-response .rag-item::before {
            content: '\2022';
            position: absolute;
            left: 2px;
            color: #555;
        }
        .rag-response .rag-num {
            padding-left: 4px;
        }

        /* Protocol link */
        .proto-link {
            color: #555;
            font-size: 11px;
            text-decoration: none;
            transition: color 0.15s;
        }
        .proto-link:hover { color: #888; }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
        }
        .status-dot.resolved { background: #00ff41; }
        .status-dot.false_alarm { background: #555; }
        .status-dot.pending { background: #ffaa00; }
        .status-dot.accepted { background: #3b82f6; }

        /* ---- Camera overlay ---- */
        .cam-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .cam-overlay.active { display: flex; }
        .cam-overlay video {
            max-width: 90%;
            max-height: 60vh;
            border: 1px solid #1a1e2a;
            border-radius: 2px;
        }
        .cam-overlay canvas { display: none; }
        .cam-btns {
            display: flex;
            gap: 8px;
        }
        .cam-btns button {
            padding: 8px 20px;
            border: 1px solid #1a1e2a;
            background: #111318;
            color: #888;
            font-family: inherit;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s;
        }
        .cam-btns button:hover { border-color: #ff2020; color: #ff2020; }
        .cam-btns button.primary { border-color: #ff2020; color: #ff2020; }
        .cam-result {
            font-size: 12px;
            color: #00ff41;
            max-width: 80%;
            text-align: center;
            min-height: 20px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1a1e2a; }

        /* Leaflet overrides */
        .leaflet-control-zoom { display: none !important; }
        .leaflet-control-attribution { display: none !important; }
        .dark-popup .leaflet-popup-content-wrapper {
            background: #111318;
            color: #ccc;
            border-radius: 2px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        .dark-popup .leaflet-popup-tip { background: #111318; }
        .leaflet-popup-close-button { color: #555 !important; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

        /* ---- Analytics page ---- */
        .analytics-page {
            flex-direction: column;
            overflow: hidden;
            padding: 16px 24px;
            width: 100%;
        }
        .analytics-iframe-wrap {
            flex: 1;
            position: relative;
            border: 1px solid #1a1e2a;
            border-radius: 2px;
            overflow: hidden;
            min-height: 0;
        }
        .datalens-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #0a0a0f;
        }
        .datalens-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0d0d14;
            color: #555;
        }
        .datalens-placeholder.hidden { display: none; }
        .placeholder-icon { font-size: 48px; margin-bottom: 12px; }
        .placeholder-text { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }
        .placeholder-hint { font-size: 11px; color: #888; margin-top: 12px; text-align: center; line-height: 1.6; }
        .analytics-actions {
            margin-top: 12px;
            flex-shrink: 0;
            text-align: right;
        }
        .analytics-fullscreen-btn {
            display: inline-block;
            padding: 6px 16px;
            border: 1px solid #1a1e2a;
            background: #111318;
            color: #888;
            font-family: inherit;
            font-size: 10px;
            letter-spacing: 1px;
            text-decoration: none;
            cursor: pointer;
            border-radius: 1px;
            transition: all 0.15s;
        }
        .analytics-fullscreen-btn:hover {
            border-color: #3b82f6;
            color: #3b82f6;
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="logo">ФАВН</span>
        <div class="tab-btns">
            <button class="tab-btn active" id="tab-map" onclick="switchTab('map')">КАРТА</button>
            <button class="tab-btn" id="tab-analytics" onclick="switchTab('analytics')">АНАЛИТИКА</button>
        </div>
        <span class="ws-status" id="ws-status">&#9679; ОТКЛ</span>
        <span class="header-spacer"></span>
        <div class="demo-btns">
            <button onclick="startDemo('chainsaw')">БНЗ</button>
            <button onclick="startDemo('gunshot')">ВЫСТ</button>
            <button onclick="startDemo('engine')">ДВИГ</button>
            <button id="btn-mic" onclick="toggleMic()">МИК</button>
            <button id="btn-cam" onclick="openCamera()">КАМ</button>
        </div>
    </div>

    <!-- Map page -->
    <div class="page active" id="page-map">
        <div class="main">
            <div class="map-wrap">
                <div id="map"></div>
                <div class="events-log" id="events-log"></div>
            </div>
            <div class="sidebar" id="sidebar">
                <div class="sb-empty" id="sb-empty">Ожидание инцидента...</div>
            </div>
        </div>
    </div>

    <!-- Analytics page -->
    <div class="page analytics-page" id="page-analytics">
        <div class="analytics-iframe-wrap">
            <iframe id="datalens-iframe" class="datalens-iframe" allowfullscreen></iframe>
            <div class="datalens-placeholder" id="datalens-placeholder">
                <div class="placeholder-icon">&#9776;</div>
                <div class="placeholder-text">Загрузка DataLens...</div>
                <div class="placeholder-hint" id="datalens-hint" style="display:none;">
                    Дашборд требует авторизации.<br>
                    <a href="" id="datalens-link" target="_blank" style="color:#3b82f6;">Открыть в DataLens</a>
                </div>
            </div>
        </div>
        <div class="analytics-actions">
            <a href="/analytics" target="_blank" class="analytics-fullscreen-btn">ОТКРЫТЬ НА ВЕСЬ ЭКРАН &#8599;</a>
        </div>
    </div>

    <!-- Camera overlay -->
    <div class="cam-overlay" id="cam-overlay">
        <video id="cam-video" autoplay playsinline></video>
        <canvas id="cam-canvas"></canvas>
        <div class="cam-result" id="cam-result"></div>
        <div class="cam-btns">
            <button class="primary" onclick="capturePhoto()">СНИМОК</button>
            <button onclick="closeCamera()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        /* ---- State ---- */
        var incident = {};
        var mapLayers = [];
        var droneMarker = null;
        var activeMics = [];
        var micRecording = false;
        var mediaRecorder = null;
        var micStream = null;
        var camStream = null;

        /* ---- Helpers ---- */
        function escHtml(s) {
            var d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        var CLASS_RU = {
            'chainsaw': 'Бензопила', 'gunshot': 'Выстрел', 'engine': 'Двигатель',
            'axe': 'Топор', 'birds': 'Птицы', 'silence': 'Тишина',
            'rain': 'Дождь', 'wind': 'Ветер', 'background': 'Фон'
        };
        function classRu(c) { return CLASS_RU[c] || c; }

        function ts() {
            var n = new Date();
            return n.getHours().toString().padStart(2,'0') + ':' +
                   n.getMinutes().toString().padStart(2,'0') + ':' +
                   n.getSeconds().toString().padStart(2,'0');
        }

        function haversine(lat1, lon1, lat2, lon2) {
            var R = 6371000;
            var p1 = lat1 * Math.PI / 180, p2 = lat2 * Math.PI / 180;
            var dp = (lat2 - lat1) * Math.PI / 180;
            var dl = (lon2 - lon1) * Math.PI / 180;
            var a = Math.sin(dp/2)*Math.sin(dp/2) + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)*Math.sin(dl/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        /*
         * confBar / confLevel: generate trusted HTML from numeric confidence values only.
         * No user-supplied strings are embedded — only computed integers and static class names.
         */
        function confBar(conf) {
            var pct = Math.round(conf * 100);
            var filled = Math.round(conf * 12);
            var bar = '\u2588'.repeat(filled) + '\u2591'.repeat(12 - filled);
            var cls = pct >= 80 ? 'conf-bar high' : pct >= 50 ? 'conf-bar warn' : 'conf-bar';
            return '<span class="' + cls + '">' + bar + '</span> ' + pct + '%';
        }

        function confLevel(conf) {
            var pct = conf * 100;
            if (pct >= 80) return '<span class="detect-level level-alert">ТРЕВОГА</span>';
            if (pct >= 50) return '<span class="detect-level level-verify">ПРОВЕРКА</span>';
            return '<span class="detect-level level-log">ЛОГ</span>';
        }

        /* ---- Tab switching ---- */
        var DATALENS_URL = 'https://datalens.yandex/aaamlpcpp7acu';

        window.switchTab = function(tab) {
            document.getElementById('page-map').classList.toggle('active', tab === 'map');
            document.getElementById('page-analytics').classList.toggle('active', tab === 'analytics');
            document.getElementById('tab-map').classList.toggle('active', tab === 'map');
            document.getElementById('tab-analytics').classList.toggle('active', tab === 'analytics');
            if (tab === 'map') {
                setTimeout(function() { map.invalidateSize(); }, 100);
            }
            if (tab === 'analytics') {
                loadAnalytics();
            }
        };

        var analyticsLoaded = false;
        function loadAnalytics() {
            // Load iframe once
            if (!analyticsLoaded) {
                var iframe = document.getElementById('datalens-iframe');
                var placeholder = document.getElementById('datalens-placeholder');
                var hint = document.getElementById('datalens-hint');
                var link = document.getElementById('datalens-link');
                link.href = DATALENS_URL;
                iframe.src = DATALENS_URL;
                iframe.onload = function() {
                    placeholder.classList.add('hidden');
                };
                // Cross-origin iframes may not fire onload properly;
                // show auth hint after timeout if placeholder is still visible
                setTimeout(function() {
                    if (!placeholder.classList.contains('hidden')) {
                        hint.style.display = 'block';
                        document.querySelector('.placeholder-text').textContent = 'DataLens';
                    }
                    placeholder.classList.add('hidden');
                }, 4000);
                analyticsLoaded = true;
            }
        }

        /* ---- Map ---- */
        var map = L.map('map', { zoomControl: false, attributionControl: false })
                   .setView([57.30, 44.90], 10);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            subdomains: 'abcd', maxZoom: 19
        }).addTo(map);

        /* ---- District boundary polygon ---- */
        fetch('/static/data/varnavino_boundary.geojson').then(function(r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
        }).then(function(geojson) {
            L.geoJSON(geojson, {
                style: { color: '#00ff41', weight: 2, fillOpacity: 0.03, fillColor: '#00ff41' }
            }).addTo(map);
        }).catch(function(e) {
            logEvent('ГРАНИЦА', 'Не загружена: ' + e.message, 'low');
        });

        /* ---- Load microphones (canvas renderer) ---- */
        var canvasRenderer = L.canvas({ padding: 0.5 });
        var micLayer = L.layerGroup().addTo(map);

        fetch('/api/v1/mics').then(function(r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
        }).then(function(mics) {
            var bounds = [];
            mics.forEach(function(m) {
                var color, radius;
                if (m.status === 'online') {
                    color = '#00ff41'; radius = 4;
                } else if (m.status === 'offline') {
                    color = '#444'; radius = 3;
                } else {
                    color = '#ff2020'; radius = 4;
                }
                var bat = m.battery_pct !== undefined ? m.battery_pct.toFixed(0) + '%' : '?';
                var popupEl = document.createElement('div');
                popupEl.style.cssText = 'font-family:monospace;font-size:11px;line-height:1.6;';
                var b = document.createElement('b');
                b.textContent = m.mic_uid;
                popupEl.appendChild(b);
                popupEl.appendChild(document.createElement('br'));
                var statusSpan = document.createElement('span');
                statusSpan.style.color = color;
                statusSpan.textContent = m.status.toUpperCase();
                popupEl.appendChild(document.createTextNode('Статус: '));
                popupEl.appendChild(statusSpan);
                popupEl.appendChild(document.createElement('br'));
                popupEl.appendChild(document.createTextNode('Зона: ' + (m.zone_type || '?')));
                popupEl.appendChild(document.createElement('br'));
                popupEl.appendChild(document.createTextNode('Батарея: ' + bat));
                popupEl.appendChild(document.createElement('br'));
                popupEl.appendChild(document.createTextNode('Участок: ' + (m.sub_district || '?')));
                L.circleMarker([m.lat, m.lon], {
                    renderer: canvasRenderer,
                    radius: radius,
                    fillColor: color,
                    fillOpacity: 0.8,
                    stroke: false
                }).bindPopup(popupEl, { className: 'dark-popup' }).addTo(micLayer);
                bounds.push([m.lat, m.lon]);
            });
            if (bounds.length) map.fitBounds(bounds, { padding: [30, 30] });
        }).catch(function(e) {
            logEvent('ОШИБКА', 'Микрофоны: ' + e.message, 'high');
        });

        /* ---- Events log ---- */
        var evLogEl = document.getElementById('events-log');

        function logEvent(tag, text, cls) {
            var el = document.createElement('div');
            el.className = 'ev-line ' + (cls || '');
            var timeSpan = document.createElement('span');
            timeSpan.className = 'ev-time';
            timeSpan.textContent = ts();
            var tagSpan = document.createElement('span');
            tagSpan.className = 'ev-tag';
            tagSpan.textContent = ' ' + tag;
            el.appendChild(timeSpan);
            el.appendChild(tagSpan);
            el.appendChild(document.createTextNode(' ' + text));
            evLogEl.prepend(el);
            while (evLogEl.children.length > 8) evLogEl.removeChild(evLogEl.lastChild);
        }

        /* ---- Sidebar ---- */
        var sidebar = document.getElementById('sidebar');
        var SECTION_ORDER = ['detection', 'location', 'decision', 'drone', 'vision', 'alert', 'rag', 'protocol'];

        function addSection(id, label, contentEl) {
            var empty = document.getElementById('sb-empty');
            if (empty) empty.remove();
            var sec = document.getElementById('sb-' + id);
            if (!sec) {
                sec = document.createElement('div');
                sec.className = 'sb-section';
                sec.id = 'sb-' + id;
                var idx = SECTION_ORDER.indexOf(id);
                var inserted = false;
                for (var i = idx + 1; i < SECTION_ORDER.length; i++) {
                    var next = document.getElementById('sb-' + SECTION_ORDER[i]);
                    if (next) { sidebar.insertBefore(sec, next); inserted = true; break; }
                }
                if (!inserted) sidebar.appendChild(sec);
            }
            sec.textContent = '';
            var lbl = document.createElement('div');
            lbl.className = 'sb-label';
            lbl.textContent = label;
            sec.appendChild(lbl);
            sec.appendChild(contentEl);
            return sec;
        }

        /* ---- Build section content using safe DOM methods ---- */

        function buildDetection(d) {
            var frag = document.createDocumentFragment();

            var cls = document.createElement('div');
            cls.className = 'detect-class';
            cls.textContent = classRu(d['class']);
            frag.appendChild(cls);

            var conf = document.createElement('div');
            conf.className = 'detect-conf';
            // confBar: trusted static HTML from numeric value only (no user strings)
            conf.innerHTML = confBar(d.confidence);
            frag.appendChild(conf);

            var lvl = document.createElement('div');
            // confLevel: trusted static HTML from numeric value only
            lvl.innerHTML = confLevel(d.confidence);
            frag.appendChild(lvl);

            return frag;
        }

        function buildLocation(d) {
            var frag = document.createDocumentFragment();
            var coords = document.createElement('div');
            coords.className = 'tri-coords';
            coords.textContent = d.lat.toFixed(4) + '\u00b0N  ' + d.lon.toFixed(4) + '\u00b0E';
            frag.appendChild(coords);

            var err = document.createElement('div');
            err.className = 'tri-error';
            err.textContent = 'Погрешность: \u00b1' + (d.error_m ? d.error_m.toFixed(1) : '?') + ' м';
            frag.appendChild(err);

            return frag;
        }

        function buildDecision(d) {
            var frag = document.createDocumentFragment();
            var reason = document.createElement('div');
            reason.style.fontSize = '12px';
            reason.textContent = d.reason;
            frag.appendChild(reason);

            var drone = document.createElement('div');
            drone.style.cssText = 'font-size:11px;color:#555;margin-top:4px;';
            var droneLabel = document.createTextNode('Дрон: ');
            var droneVal = document.createElement('span');
            droneVal.style.color = d.send_drone ? '#00ff41' : '#444';
            droneVal.textContent = d.send_drone ? 'ВЫЛЕТ' : 'нет';
            drone.appendChild(droneLabel);
            drone.appendChild(droneVal);
            frag.appendChild(drone);

            return frag;
        }

        function buildDronePhoto(b64) {
            var img = document.createElement('img');
            img.className = 'drone-photo';
            img.src = 'data:image/jpeg;base64,' + b64;
            img.alt = 'Фото с дрона';
            return img;
        }

        function buildVision(d) {
            var frag = document.createDocumentFragment();

            var desc = document.createElement('div');
            desc.className = 'vision-desc';
            desc.textContent = d.description;
            frag.appendChild(desc);

            var flags = document.createElement('div');
            flags.className = 'vision-flags';

            [['Рубка', d.has_felling], ['Люди', d.has_human], ['Огонь', d.has_fire]].forEach(function(pair) {
                var span = document.createElement('span');
                span.className = 'vision-flag ' + (pair[1] ? 'yes' : 'no');
                span.textContent = pair[0] + ': ' + (pair[1] ? 'ДА' : 'НЕТ');
                flags.appendChild(span);
            });
            frag.appendChild(flags);

            return frag;
        }

        function buildAlert(d) {
            var frag = document.createDocumentFragment();

            var gpt = document.createElement('div');
            gpt.className = 'gpt-text';
            gpt.textContent = d.text;
            frag.appendChild(gpt);

            var btn = document.createElement('button');
            btn.className = 'rag-btn';
            btn.textContent = 'Запросить рекомендации (RAG)';
            btn.addEventListener('click', queryRAG);
            frag.appendChild(btn);

            var result = document.createElement('div');
            result.id = 'rag-result';
            frag.appendChild(result);

            return frag;
        }

        function buildProtocol() {
            var a = document.createElement('a');
            a.className = 'proto-link';
            a.href = '#';
            a.textContent = 'Проект протокола PDF (через Telegram-бот @ya_faun_bot)';
            a.addEventListener('click', function(e) { e.preventDefault(); });
            return a;
        }

        /* ---- Clear incident layers ---- */
        function clearIncidentLayers() {
            mapLayers.forEach(function(l) { map.removeLayer(l); });
            mapLayers = [];
            if (droneMarker) { map.removeLayer(droneMarker); droneMarker = null; }
        }

        /* ---- WebSocket ---- */
        var wsStatus = document.getElementById('ws-status');

        function connect() {
            var proto = location.protocol === 'https:' ? 'wss' : 'ws';
            var ws = new WebSocket(proto + '://' + location.host + '/ws');
            ws.onopen = function() {
                wsStatus.textContent = '\u25cf ОК';
                wsStatus.className = 'ws-status ok';
            };
            ws.onclose = function() {
                wsStatus.textContent = '\u25cf ОТКЛ';
                wsStatus.className = 'ws-status';
                setTimeout(connect, 2000);
            };
            ws.onmessage = function(e) { handleEvent(JSON.parse(e.data)); };
        }
        connect();

        /* ---- Handle WS events ---- */
        function handleEvent(d) {
            switch (d.event) {
                case 'mic_active': {
                    activeMics = d.mics || [];
                    if (d.mics) {
                        d.mics.forEach(function(m, i) {
                            var icon = L.divIcon({
                                html: '<div style="width:14px;height:14px;border-radius:50%;background:#3b82f6;border:2px solid #60a5fa;opacity:0.9;"></div>',
                                iconSize: [14, 14], className: ''
                            });
                            var mk = L.marker([m.lat, m.lon], { icon: icon }).addTo(map);
                            mk.bindPopup('Активный MIC-' + String.fromCharCode(65 + i));
                            mapLayers.push(mk);
                        });
                    }
                    logEvent('МИКРОФОНЫ', 'активны (' + (d.mics ? d.mics.length : '?') + ')', 'low');
                    break;
                }

                case 'source_point': {
                    var srcIcon = L.divIcon({
                        html: '<div style="width:16px;height:16px;border-radius:50%;background:#ff2020;border:2px solid #ff6060;animation:pulse 1s infinite;"></div>',
                        iconSize: [16, 16], className: ''
                    });
                    var srcMk = L.marker([d.lat, d.lon], { icon: srcIcon }).addTo(map);
                    srcMk.bindPopup('Источник: ' + classRu(d.scenario));
                    mapLayers.push(srcMk);
                    logEvent('ИСТОЧНИК', classRu(d.scenario) + ' ' + d.lat.toFixed(4) + ' ' + d.lon.toFixed(4), 'high');
                    break;
                }

                case 'onset_check': {
                    logEvent('ДЕТЕКЦИЯ', d.triggered ? 'резкий звук x' + d.energy_ratio : 'тишина x' + d.energy_ratio, d.triggered ? 'high' : 'low');
                    break;
                }

                case 'audio_classified': {
                    incident.audioClass = d['class'];
                    incident.confidence = d.confidence;
                    var isThreat = d['class'] !== 'birds' && d['class'] !== 'silence' && d['class'] !== 'background';
                    addSection('detection', 'ДЕТЕКЦИЯ', buildDetection(d));
                    logEvent('ЗВУК', classRu(d['class']) + ' ' + (d.confidence * 100).toFixed(0) + '%', isThreat ? 'high' : 'low');
                    break;
                }

                case 'location_found': {
                    incident.lat = d.lat;
                    incident.lon = d.lon;
                    incident.error_m = d.error_m;

                    var circle = L.circle([d.lat, d.lon], {
                        radius: d.error_m || 50, color: '#ff2020', fillColor: '#ff2020',
                        fillOpacity: 0.12, weight: 1, dashArray: '4 4'
                    }).addTo(map);
                    mapLayers.push(circle);

                    activeMics.forEach(function(m) {
                        var dist = haversine(m.lat, m.lon, d.lat, d.lon);
                        var rc = L.circle([m.lat, m.lon], {
                            radius: dist, color: '#3b82f6', fillColor: 'transparent',
                            weight: 1, dashArray: '6 4', opacity: 0.5
                        }).addTo(map);
                        mapLayers.push(rc);
                        var ln = L.polyline([[m.lat, m.lon], [d.lat, d.lon]], {
                            color: '#3b82f6', weight: 1, dashArray: '4 4', opacity: 0.4
                        }).addTo(map);
                        mapLayers.push(ln);
                    });

                    var locIcon = L.divIcon({
                        html: '<div style="width:12px;height:12px;border-radius:50%;border:2px solid #ff2020;background:transparent;"></div>',
                        iconSize: [12, 12], className: ''
                    });
                    var locMk = L.marker([d.lat, d.lon], { icon: locIcon }).addTo(map);
                    mapLayers.push(locMk);
                    map.setView([d.lat, d.lon], 14);

                    addSection('location', 'ТРИАНГУЛЯЦИЯ', buildLocation(d));
                    var errStr = d.error_m ? '\u00b1' + d.error_m.toFixed(1) + 'м' : '?';
                    logEvent('ТРИАНГУЛЯЦИЯ', d.lat.toFixed(4) + ' ' + d.lon.toFixed(4) + ' ' + errStr, 'medium');
                    break;
                }

                case 'agent_decision': {
                    addSection('decision', 'РЕШЕНИЕ', buildDecision(d));
                    logEvent('РЕШЕНИЕ', d.reason, d.send_drone ? 'high' : 'low');
                    break;
                }

                case 'drone_moving': {
                    if (droneMarker) map.removeLayer(droneMarker);
                    var dIcon = L.divIcon({
                        html: '<div style="font-size:16px;text-align:center;filter:drop-shadow(0 0 4px #3b82f6);">&#9992;</div>',
                        iconSize: [20, 20], className: ''
                    });
                    droneMarker = L.marker([d.lat, d.lon], { icon: dIcon }).addTo(map);
                    break;
                }

                case 'drone_photo': {
                    if (d.drone_b64) {
                        addSection('drone', 'ДРОН', buildDronePhoto(d.drone_b64));
                    }
                    logEvent('ФОТО', 'получено', 'medium');
                    break;
                }

                case 'vision_classified': {
                    incident.vision = d;
                    addSection('vision', 'АНАЛИЗ ФОТО', buildVision(d));
                    logEvent('АНАЛИЗ ФОТО', d.has_felling ? 'рубка обнаружена' : 'норма', 'medium');
                    break;
                }

                case 'alert_sent': {
                    incident.alertText = d.text;
                    addSection('alert', 'YANDEXGPT', buildAlert(d));
                    addSection('protocol', '', buildProtocol());
                    logEvent('АЛЕРТ', 'отправлен', 'high');
                    break;
                }

                case 'pipeline_end': {
                    logEvent('ГОТОВО', d.reason, 'low');
                    break;
                }
            }
        }

        /* ---- RAG query ---- */
        function escapeHtml(str) {
            var d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function applyBold(escapedText) {
            return escapedText.replace(/\*\*(.+?)\*\*/g, '<span class="rag-bold">$1</span>');
        }

        function formatRAGResponse(text) {
            var container = document.createElement('div');
            container.className = 'rag-response';
            var lines = text.split('\n');
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i];
                if (/^##\s+/.test(line)) {
                    var h = document.createElement('div');
                    h.className = 'rag-heading';
                    h.textContent = line.replace(/^##\s+/, '');
                    container.appendChild(h);
                } else if (/^\d+\.\s+/.test(line)) {
                    var num = document.createElement('div');
                    num.className = 'rag-num';
                    num.innerHTML = applyBold(escapeHtml(line));
                    container.appendChild(num);
                } else if (/^[-\u2022]\s+/.test(line)) {
                    var li = document.createElement('div');
                    li.className = 'rag-item';
                    li.innerHTML = applyBold(escapeHtml(line.replace(/^[-\u2022]\s+/, '')));
                    container.appendChild(li);
                } else if (line.trim()) {
                    var p = document.createElement('div');
                    p.innerHTML = applyBold(escapeHtml(line));
                    container.appendChild(p);
                }
            }
            return container;
        }

        function queryRAG() {
            var btn = sidebar.querySelector('.rag-btn');
            var result = document.getElementById('rag-result');
            if (!btn || !result) return;

            btn.disabled = true;
            btn.textContent = 'ЗАПРОС...';
            result.textContent = '';

            var classQuestions = {
                chainsaw: 'незаконной рубке леса',
                axe: 'незаконной рубке леса',
                gunshot: 'факте незаконной охоты',
                engine: 'несанкционированном заезде техники',
                fire: 'лесном пожаре'
            };
            var topic = classQuestions[incident.audioClass] || 'обнаруженном нарушении';

            var payload = {
                question: 'Какие действия должен предпринять инспектор при ' + topic + '? Какие статьи ЛК РФ, УК РФ, КоАП применимы?'
            };
            if (incident.audioClass) payload.audio_class = incident.audioClass;
            if (incident.confidence) payload.confidence = incident.confidence;
            if (incident.lat) { payload.lat = incident.lat; payload.lon = incident.lon; }
            if (incident.vision) {
                payload.vision_description = incident.vision.description || '';
                payload.has_felling = !!incident.vision.has_felling;
                payload.has_human = !!incident.vision.has_human;
                payload.has_fire = !!incident.vision.has_fire;
            }

            fetch('/api/v1/rag-query', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            }).then(function(r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            }).then(function(data) {
                result.appendChild(formatRAGResponse(data.answer));
            }).catch(function(e) {
                var resp = document.createElement('div');
                resp.className = 'rag-response';
                resp.style.color = '#ff2020';
                resp.textContent = 'Ошибка: ' + e.message;
                result.appendChild(resp);
            }).finally(function() {
                btn.disabled = false;
                btn.textContent = 'Запросить рекомендации (RAG)';
            });
        }

        /* ---- Start demo ---- */
        window.startDemo = function(scenario) {
            switchTab('map');
            clearIncidentLayers();
            incident = {};
            activeMics = [];

            sidebar.textContent = '';
            var empty = document.createElement('div');
            empty.className = 'sb-empty';
            empty.id = 'sb-empty';
            empty.textContent = 'Запуск: ' + classRu(scenario) + '...';
            sidebar.appendChild(empty);

            evLogEl.textContent = '';

            fetch('/api/v1/demo', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ scenario: scenario })
            }).then(function() {
                logEvent('ЗАПУСК', classRu(scenario), 'low');
            }).catch(function(e) {
                logEvent('ОШИБКА', e.message, 'high');
            });
        };

        /* ---- Live Mic ---- */
        window.toggleMic = function() {
            if (micRecording) {
                stopMic();
            } else {
                startMic();
            }
        };

        function startMic() {
            var btn = document.getElementById('btn-mic');
            navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
                micStream = stream;
                micRecording = true;
                btn.classList.add('live-active');
                logEvent('МИК', 'запись...', 'high');
                recordChunk();
            }).catch(function(e) {
                logEvent('ОШИБКА', 'Микрофон: ' + e.message, 'high');
            });
        }

        function recordChunk() {
            if (!micRecording || !micStream) return;
            var chunks = [];
            mediaRecorder = new MediaRecorder(micStream, { mimeType: 'audio/webm;codecs=opus' });
            mediaRecorder.ondataavailable = function(e) {
                if (e.data.size > 0) chunks.push(e.data);
            };
            mediaRecorder.onstop = function() {
                if (chunks.length === 0) return;
                var blob = new Blob(chunks, { type: 'audio/webm' });
                sendAudioChunk(blob);
                if (micRecording) {
                    setTimeout(recordChunk, 200);
                }
            };
            mediaRecorder.start();
            setTimeout(function() {
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                }
            }, 5000);
        }

        function sendAudioChunk(blob) {
            var fd = new FormData();
            fd.append('file', blob, 'chunk.webm');
            logEvent('МИК', 'анализ 5с...', 'medium');
            fetch('/api/v1/live/audio', { method: 'POST', body: fd })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    logEvent('МИК', classRu(data.audio_class) + ' ' + (data.confidence * 100).toFixed(0) + '%',
                        data.audio_class !== 'background' && data.audio_class !== 'unknown' ? 'high' : 'low');
                })
                .catch(function(e) {
                    logEvent('ОШИБКА', 'Live audio: ' + e.message, 'high');
                });
        }

        function stopMic() {
            micRecording = false;
            var btn = document.getElementById('btn-mic');
            btn.classList.remove('live-active');
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            if (micStream) {
                micStream.getTracks().forEach(function(t) { t.stop(); });
                micStream = null;
            }
            logEvent('МИК', 'остановлен', 'low');
        }

        /* ---- Live Camera ---- */
        window.openCamera = function() {
            var overlay = document.getElementById('cam-overlay');
            var video = document.getElementById('cam-video');
            var resultEl = document.getElementById('cam-result');
            resultEl.textContent = '';
            overlay.classList.add('active');
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(function(stream) {
                camStream = stream;
                video.srcObject = stream;
            }).catch(function(e) {
                resultEl.textContent = 'Камера: ' + e.message;
                resultEl.style.color = '#ff2020';
            });
        };

        window.closeCamera = function() {
            var overlay = document.getElementById('cam-overlay');
            overlay.classList.remove('active');
            if (camStream) {
                camStream.getTracks().forEach(function(t) { t.stop(); });
                camStream = null;
            }
            var video = document.getElementById('cam-video');
            video.srcObject = null;
        };

        window.capturePhoto = function() {
            var video = document.getElementById('cam-video');
            var canvas = document.getElementById('cam-canvas');
            var resultEl = document.getElementById('cam-result');
            if (!video.videoWidth) {
                resultEl.textContent = 'Видео не готово';
                resultEl.style.color = '#ff2020';
                return;
            }
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(function(blob) {
                resultEl.textContent = 'Анализ...';
                resultEl.style.color = '#ffaa00';
                var fd = new FormData();
                fd.append('file', blob, 'photo.jpg');
                fetch('/api/v1/live/photo', { method: 'POST', body: fd })
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        var parts = [data.description];
                        if (data.has_felling) parts.push('РУБКА');
                        if (data.has_human) parts.push('ЛЮДИ');
                        if (data.has_fire) parts.push('ОГОНЬ');
                        resultEl.textContent = parts.join(' | ');
                        resultEl.style.color = (data.has_felling || data.has_fire) ? '#ff2020' : '#00ff41';
                        logEvent('КАМЕРА', data.description.substring(0, 60), 'medium');
                    })
                    .catch(function(e) {
                        resultEl.textContent = 'Ошибка: ' + e.message;
                        resultEl.style.color = '#ff2020';
                    });
            }, 'image/jpeg', 0.85);
        };

        /* ---- Stats page ---- */
    })();
    </script>
