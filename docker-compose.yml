services:
  cloud:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - yamnet_cache:/tmp/yamnet_cache
    depends_on:
      lora_gateway:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=5).raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  edge:
    build: .
    command: sh -c "python demo/generate_audio.py && python -m edge.server"
    env_file:
      - .env
    volumes:
      - ./demo/audio:/app/demo/audio
      - yamnet_cache:/tmp/yamnet_cache
    restart: unless-stopped

  lora_gateway:
    build: .
    command: python -m gateway.relay
    ports:
      - "9000:9000"
    env_file:
      - .env
    restart: unless-stopped

volumes:
  yamnet_cache:
